<!DOCTYPE html>
<html>
    <head>
        <title>Catalogo</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
        <link rel="stylesheet" href="../CSS/style.css"/>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="../index.html">Ventas De Productos</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </nav>
        <div class="bg-secondary py-3">
            <h1 class="py-3 ps-4 text-light text-center">Detalle de Producto</h1>
        </div>

        <main class="container my-3">
            <div class="row mt-3">
                <div class="col-md-12 mb-3">
                    <div class="card">
                        <div class="row" id="productDetails">
                        </div>
                        <div class="d-flex justify-content-end align-items-end mb-3" id="btnContainer">
                            <button type="button" class="btn btn-secondary" id="btnModificar">Modificar</button>
                            <button type="button" class="btn btn-danger mx-3" id="btnEliminar">Eliminar</button>
                            <button class="btn btn-primary mt-3 me-3 d-none" form="updateProductForm" type="submit" id="btnGuardar">Guardar Cambios</button> 
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <script src="../JS/ProductDetails.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>   
    </body>
</html>
